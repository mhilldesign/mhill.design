<!DOCTYPE html>
<html lang="en">
    <head>
        <script source="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="shortcut icon" type="image/png" href="logo.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=VT323&display=swap" rel="stylesheet">
        <title>Moira Hill Design</title>
    </head>
    <style>
        body {
            background-color: white;
        }
    </style>
    <body>
        <nav id="top">
        <a href="index.html"><img src="logo.png" class="logo"></a>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="index.html" class="active nav-link">Works</a>
            </li>
            <li class="nav-item">
                <a href="categories.html" class="nav-link">Categories</a>
            </li>
            <li class="nav-item">
                <a href="about.html" class="nav-link">About</a>
            </li>
        </ul>
        <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>
        <span id="loader"></span>
        <div class="white">
            <img src="motherboard-layout.jpg" class="project">
        </div>
        
        <script>
            const hamburger = document.querySelector(".hamburger")
        const nav_menu = document.querySelector(".nav-menu")

        hamburger.addEventListener("click", () => {
            hamburger.classList.toggle("active");
            nav_menu.classList.toggle("active");
        })

        document.querySelectorAll(".nav-link").forEach(n => n.addEventListener("click", () => {
            hamburger.classList.remove("active");
            nav_menu.classList.remove("active");
        }))

            let loader = document.getElementById('loader');
            window.onload = (event) => {
                setTimeout(function() {
                    loader.classList.add("disappear");
                        setTimeout(function() {
                            loader.remove();
                        }, 1250);
                }, 500);
            };
        </script>
    </body>
</html>
